<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Campeonato Profissional</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #00e676;
}

input {
  padding: 10px;
  width: 220px;
  border: none;
  border-radius: 6px;
}

button {
  padding: 7px 10px;
  margin: 3px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.add { background:#00c853; color:white; }
.win { background:#2196f3; color:white; }
.draw { background:#ffb300; color:black; }
.reset { background:#e53935; color:white; }

table {
  margin: 20px auto;
  width: 1000px;
  border-collapse: collapse;
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background:#00c853;
  color:black;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #333;
}

.match {
  background:#222;
  width:700px;
  margin:10px auto;
  padding:10px;
  border-radius:8px;
}
</style>

</head>

<body>

<h1>Campeonato Profissional</h1>

<input id="teamInput" placeholder="Nome do time">
<button class="add" onclick="addTeam()">Adicionar</button>
<button class="reset" onclick="reset()">Resetar Campeonato</button>

<h2>Jogos</h2>
<div id="matches"></div>

<h2>Tabela</h2>

<table>
<thead>
<tr>
<th>Pos</th>
<th>Time</th>
<th>P</th>
<th>V</th>
<th>E</th>
<th>D</th>
<th>GP</th>
<th>GC</th>
<th>SG</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let data = load();

let teams = data.teams || [];
let matches = data.matches || [];

function addTeam() {
  const input = document.getElementById("teamInput");
  const name = input.value.trim();
  if (!name) return;

  teams.push({
    name,
    p:0, v:0, e:0, d:0,
    gp:0, gc:0
  });

  input.value = "";
  generateMatches();
  save();
  render();
}

function generateMatches() {
  matches = [];

  for (let i=0;i<teams.length;i++){
    for (let j=0;j<teams.length;j++){
      if (i !== j){
        matches.push({a:i,b:j,played:false});
      }
    }
  }
}

function play(i, res){
  const m = matches[i];

  if (res === "a"){
    teams[m.a].v++; teams[m.a].p+=3;
    teams[m.b].d++;
    teams[m.a].gp++; teams[m.b].gc++;
  }

  if (res === "b"){
    teams[m.b].v++; teams[m.b].p+=3;
    teams[m.a].d++;
    teams[m.b].gp++; teams[m.a].gc++;
  }

  if (res === "e"){
    teams[m.a].e++; teams[m.b].e++;
    teams[m.a].p++; teams[m.b].p++;
  }

  m.played = true;

  save();
  render();
}

function renderMatches(){
  const div = document.getElementById("matches");
  div.innerHTML = "";

  matches.forEach((m,i)=>{
    if (m.played) return;

    const el = document.createElement("div");
    el.className="match";

    el.innerHTML = `
      ${teams[m.a].name} vs ${teams[m.b].name}<br><br>
      <button class="win" onclick="play(${i},'a')">${teams[m.a].name}</button>
      <button class="draw" onclick="play(${i},'e')">Empate</button>
      <button class="win" onclick="play(${i},'b')">${teams[m.b].name}</button>
    `;

    div.appendChild(el);
  });
}

function renderTable(){
  const t = document.getElementById("table");
  t.innerHTML="";

  let sorted = [...teams].sort((a,b)=>
    b.p - a.p || (b.gp-b.gc) - (a.gp-a.gc)
  );

  sorted.forEach((x,i)=>{
    const row=document.createElement("tr");

    row.innerHTML=`
      <td>${i+1}</td>
      <td>${x.name}</td>
      <td>${x.p}</td>
      <td>${x.v}</td>
      <td>${x.e}</td>
      <td>${x.d}</td>
      <td>${x.gp}</td>
      <td>${x.gc}</td>
      <td>${x.gp-x.gc}</td>
    `;

    t.appendChild(row);
  });
}

function render(){
  renderMatches();
  renderTable();
}

function save(){
  localStorage.setItem("proChamp", JSON.stringify({teams,matches}));
}

function load(){
  const d = localStorage.getItem("proChamp");
  return d ? JSON.parse(d) : {teams:[],matches:[]};
}

function reset(){
  teams=[];
  matches=[];
  save();
  render();
}

render();
</script>

</body>
</html>
